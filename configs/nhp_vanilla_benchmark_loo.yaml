# LOO cross-validation: vanilla TabPFN vs GP on ALL NHP subjects.
# Evaluates every subject in ALL_SUBJECTS['nhp'] = [0, 1, 3].
# Use a separate family tag from vanilla-benchmark to avoid merging with
# held-out-only runs during aggregation.
#
# Usage:
#   python src/vanilla_benchmark.py --config configs/nhp_vanilla_benchmark_loo.yaml
#
# SLURM (one job per subject):
#   for SUBJ in 0 1 3; do
#     sbatch --wrap="conda run -n pfns4neurostim python src/vanilla_benchmark.py \
#       --config configs/nhp_vanilla_benchmark_loo.yaml --held_out_subj $SUBJ \
#       --mode fit,optimization --save"
#   done
#
# Aggregate:
#   python src/aggregate.py --config configs/nhp_vanilla_benchmark_loo.yaml \
#     --result_types fit optimization

family: vanilla-benchmark-loo
dataset: nhp
subjects_mode: all
mode:
  - optimization

# Evaluation
budget: 100
n_reps: 30

# UCB kappa bounds — omit to use auto-scaling:
#   kappa_max = max(2.5 * sqrt(d * log(n_steps)), 3.0)
#   kappa_min = 0.2 * sqrt(d * log(n_steps))
# Override with explicit values for fixed-kappa ablation:
#   kappa_max: 2.5
#   kappa_min: 2.5

# Infrastructure
device: cuda
save: true
seed: 42
