# Canonical hyperparameters for NHP vanilla TabPFN vs GP benchmark.
# Family: vanilla-benchmark
# Usage:
#   python src/vanilla_benchmark.py --config configs/nhp_vanilla_benchmark.yaml
#   python src/vanilla_benchmark.py --config configs/nhp_vanilla_benchmark.yaml --budget 50

family: vanilla-benchmark
dataset: nhp
mode:
  - fit
  - optimization
  - optimization_budget

# Evaluation
budget: 100
n_reps: 30
budgets:
  - 10
  - 30
  - 50
  - 100
  - 200

# UCB kappa control:
#   kappa_schedule: 0.0  →  auto cosine-annealed schedule (GP-UCB theory scaling)
#                           kappa_max = max(2.5 * sqrt(d * log(n_steps)), 3.0)
#                           kappa_min = 0.2 * sqrt(d * log(n_steps))
#   kappa_schedule: 2.5  →  fixed kappa=2.5 throughout (no annealing)
kappa_schedule: 0.0

# kappa values tested in kappa_search mode
kappa_values:
  - 0.5
  - 1.0
  - 2.0
  - 3.0
  - 5.0

# Infrastructure
device: cuda
save: true
seed: 42
