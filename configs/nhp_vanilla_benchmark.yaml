# Canonical hyperparameters for NHP vanilla TabPFN vs GP benchmark.
# Family: vanilla-benchmark
# Usage:
#   python src/vanilla_benchmark.py --config configs/nhp_vanilla_benchmark.yaml
#   python src/vanilla_benchmark.py --config configs/nhp_vanilla_benchmark.yaml --budget 50

family: vanilla-benchmark
dataset: nhp
mode:
  - fit
  - optimization
  - optimization_budget

# Evaluation
budget: 100
n_reps: 30
budgets:
  - 10
  - 30
  - 50
  - 100
  - 200

# UCB coefficients (TabPFN only; GP uses hardcoded kappa_0=5.0, kappa_min=1.0)
kappa_0: 2.5
kappa_min: 0.5

# Infrastructure
device: cuda
save: true
seed: 42
