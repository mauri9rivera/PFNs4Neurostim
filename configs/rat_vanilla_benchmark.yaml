# Canonical hyperparameters for rat vanilla TabPFN vs GP benchmark.
# Family: vanilla-benchmark
# Usage:
#   python src/vanilla_benchmark.py --config configs/rat_vanilla_benchmark.yaml

family: vanilla-benchmark
dataset: rat
mode:
  - fit
  - optimization
  - optimization_budget

# Evaluation — rat grid is 8x4=32 sites, so budget matches grid size
budget: 32
n_reps: 30
budgets:
  - 10
  - 20
  - 32
  - 50
  - 100

# UCB kappa control:
#   kappa_schedule: 0.0  →  auto cosine-annealed schedule (GP-UCB theory scaling)
#                           kappa_max = max(2.5 * sqrt(d * log(n_steps)), 3.0)
#                           kappa_min = 0.2 * sqrt(d * log(n_steps))
#   kappa_schedule: 2.5  →  fixed kappa=2.5 throughout (no annealing)
kappa_schedule: 0.0

# kappa values tested in kappa_search mode
kappa_values:
  - 0.5
  - 1.0
  - 2.0
  - 3.0
  - 5.0

# Infrastructure
device: cuda
save: true
seed: 42
