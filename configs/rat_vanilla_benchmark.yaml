# Canonical hyperparameters for rat vanilla TabPFN vs GP benchmark.
# Family: vanilla-benchmark
# Usage:
#   python src/vanilla_benchmark.py --config configs/rat_vanilla_benchmark.yaml

family: vanilla-benchmark
dataset: rat
mode:
  - fit
  - optimization
  - optimization_budget

# Evaluation — rat grid is 8x4=32 sites, so budget matches grid size
budget: 32
n_reps: 30
budgets:
  - 10
  - 20
  - 32
  - 50
  - 100

# UCB coefficients (TabPFN only; GP uses hardcoded kappa_0=5.0, kappa_min=1.0)
kappa_0: 2.5
kappa_min: 0.5

# Infrastructure
device: cuda
save: true
seed: 42
